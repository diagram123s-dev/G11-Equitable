<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Class Announcements</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2657A8" />
<style>
  :root {
    --bg: #F4F6FB;
    --card: #FFFFFF;
    --ink: #1B2430;
    --muted: #5C6678;
    --accent: #2657A8;
    --accent-soft: #E7EEFC;
    --good: #1E8E5A;
    --warn: #C0392B;
    --border: #E1E5EE;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 28px 20px 22px;
    border-radius: 0 0 18px 18px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    letter-spacing: -0.2px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    opacity: 0.85;
  }
  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 16px 40px;
  }
  #statusBar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 14px;
  }
  #statusDot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--warn);
    flex-shrink: 0;
  }
  #statusDot.on { background: var(--good); }
  #enableBtn {
    margin-left: auto;
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  #enableBtn:disabled {
    background: var(--good);
    cursor: default;
  }
  .feed-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 4px 2px 10px;
  }
  .announcement {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .announcement .meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .announcement .title {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
  }
  .announcement .body {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 60px 20px;
  }
</style>
</head>
<body>

<header>
  <h1>📌 Class Announcements</h1>
  <p>Stay updated on what your class needs to know</p>
</header>

<main>
  <div id="statusBar">
    <div id="statusDot"></div>
    <span id="statusText">Notifications are off</span>
    <button id="enableBtn">Enable</button>
  </div>

  <div class="feed-label">Latest updates</div>
  <div id="feed">
    <div class="empty">Loading announcements…</div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
